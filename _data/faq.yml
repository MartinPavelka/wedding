- question: "Kdy se mám v sobotu ubytovat a dokdy se mám v neděli vystěhovat?"
  answer: "Ubytování v hotelu je možné od 14:00 a vystěhování do 11:00. Na Penzionech je ubytování možné od 16:00 a vystěhování do 10:30."
- question: "Můžu dostat snídani?"
  answer: "Na hotelu je snídaně v ceně ubytování. Pro ubytované na penzionech je snídaně zařízena na základě předchozí domluvy."
- question: "Kdy můžu dostat snídani?"
  answer: "Snídaně probíhají od 8:00 do 10:00. Na hotelu jsou v hotelové restauraci. Pro hosty penzionů jsou snídaně podávané v penzionu Pivovar."
- question: "Jedu z daleka, co když budu mít po příjezdu v sobotu hlad? Mám si s sebou vzít svačinu?"
  answer: "Jasně. Rohlíkem nezarmoutíš. Pro každý případ jsme pro vás ale připravlili menší občerstevní před obřadem v lobby hotelu."
- question: "Kde si mám nechat věci, když se můžu ubytovat až po obřadu a obědě?"
  answer: "Žádný strach, připravili jsme pro vás místnost, kam si můžete uschovat zavazadla do doby check-inu. Pokud byste se snad potřebovali upravit, či převléknout, pak vám bude k dispozici prostor v kongresovém či wellness centru."
- question: "Nemám oblečení požadované barvy, je to problém?"
  answer: "Určitě není. Budeme moc rádi, když se vám podaří sladit se s barvami svatby, ale není to samozřejmě podmínka. Malý tip: Pokud by se vám nepodařilo sehnat vše v barvách svatby, i malý detail oceníme, jako třeba růžový kapesníček do klopy, či modré lodičky."
- question: "Můžeme přijet dřív, než v sobotu?"
  answer: "Teď už vám to zařídit nestihneme. Můžete se zkusit obrátit přímo na hotel (vinice-hnanice.cz)"
- question: "Jak je to s konzumací alkoholu, co všechno je hrazeno a co si platím sám?"
  answer: "Od nás máte hrazeno víno z vinařství, místní pivo Wolfgang (točené), lahvové pivo (pouze u oběda), a alkohol, který naleznete v “Pánském koutku”. Pak samozřejmě hradíme nealkoholické nápoje včetně těch teplých jako káva a čaj. Vše ostatní, zejména tedy tvrdý alkohol, si hradíte sami (hotově/kartou/napsat na pokoj)."
