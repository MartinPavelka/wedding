<div class="container">
  <div class="row">
    <div class="col-md-12 pt-4">
      <ul class="list-group list-group-flush">
        {% for item in site.data.faq %}
        <li class="list-group-item mt-3">
          <b>{{ item.question }}</b>
          <p class="caption">{{ item.answer }}</p>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
