<div class="container">
  <div class="row">
    <div class="col-md-12 pt-3 text-center">
      <h2>Naše barvy</h2>
    </div>
  </div>
  <div class="row d-flex justify-content-around">
    {% for color in site.data.color %}
    <div class="col-md-2 pt-3">
      <div class="text-center">
        <img src="{{ color.image-path }}" alt="{{ color.title}}" class="w-50 mx-auto rounded-circle"/>
        <p class="caption pt-3">{{ color.title }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
